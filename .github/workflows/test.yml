name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build -trimpath -o /tmp/1remote-cloud ./cmd/server

      - name: Test (with race detector)
        run: go test -race -count=1 ./...

      - name: go vet
        run: go vet ./...
