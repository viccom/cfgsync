name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build -trimpath -o /tmp/cfgsync ./cmd/server

      - name: Test (with race detector)
        run: go test -race -count=1 ./...

      - name: go vet
        run: go vet ./...

      - name: Syntax-check the WebUI bundle
        # Catches mismatched template literals, missing brackets, etc. before
        # the JS reaches a browser. Zero dependencies; node ships with
        # GitHub Actions runners. Catches the bug that escaped v0.3.0:
        # 'return html`<p>...';' (single quote instead of backtick).
        run: node --check internal/webui/dist/assets/app.js
