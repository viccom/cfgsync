name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build (linux-amd64)
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/1remote-cloud-linux-amd64 ./cmd/server
          sha256sum dist/1remote-cloud-linux-amd64 | awk '{print $1}' > dist/1remote-cloud-linux-amd64.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 1remote-cloud-linux-amd64
          path: |
            dist/1remote-cloud-linux-amd64
            dist/1remote-cloud-linux-amd64.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/1remote-cloud-linux-amd64
            dist/1remote-cloud-linux-amd64.sha256
          generate_release_notes: true
